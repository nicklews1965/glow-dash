workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 30
    integrations:
      app_store_connect: "Glow Dash"
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.developer.glowdash
      vars:
        XCODE_SCHEME: "GlowDash"
        BUNDLE_ID: "com.developer.glowdash"
        APP_STORE_APPLE_ID: "6761740652"
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Install CocoaPods dependencies
        script: |
          pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Set build number
        script: |
          agvtool new-version -all $PROJECT_BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "GlowDash.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
