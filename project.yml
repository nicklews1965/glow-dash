name: GlowDash

options:
  bundleIdPrefix: com.developer
  deploymentTarget:
    iOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "26.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  GlowDash:
    type: application
    platform: iOS
    sources:
      - path: GlowDash
        excludes:
          - "Resources/Sounds/.gitkeep"
          - "Resources/Music/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.developer.glowdash
        INFOPLIST_FILE: GlowDash/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_INTERFACE_ORIENTATIONS: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - framework: SpriteKit.framework
        implicit: true
      - framework: GameplayKit.framework
        implicit: true
